<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Calendar body — Rust orange -->
  <rect x="1" y="3" width="22" height="20" rx="3" fill="#CE422B"/>

  <!-- Header band — darker shade -->
  <rect x="1" y="3" width="22" height="7" rx="3" fill="#A8341F"/>
  <rect x="1" y="7" width="22" height="3" fill="#A8341F"/>

  <!-- Binding rings -->
  <rect x="7"  y="1" width="3" height="5" rx="1.5" fill="#7A2010"/>
  <rect x="14" y="1" width="3" height="5" rx="1.5" fill="#7A2010"/>

  <!-- Day squares — row 1 -->
  <rect x="4"  y="13" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="10" y="13" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="16" y="13" width="4" height="4" rx="1" fill="white" opacity="0.9"/>

  <!-- Day squares — row 2 -->
  <rect x="4"  y="19" width="4" height="3" rx="1" fill="white" opacity="0.9"/>
  <rect x="10" y="19" width="4" height="3" rx="1" fill="white" opacity="0.9"/>
  <rect x="16" y="19" width="4" height="3" rx="1" fill="white" opacity="0.35"/>
</svg>
