name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          # Inno Setup 6 is preinstalled on windows-latest runners under
          # C:\Program Files (x86)\Inno Setup 6\. Compile in-place; output
          # lands next to the .iss file as `ruscal-setup.exe`.
          $version = "${{ github.ref_name }}".TrimStart("v")
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found at $iscc; installing via choco"
            choco install innosetup -y --no-progress
          }
          & $iscc "/DMyAppVersion=$version" installer\ruscal.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit $LASTEXITCODE" }
          # Surface the produced installer next to the bare exe so the
          # release step can attach both.
          Move-Item installer\Output\ruscal-setup.exe .
          Get-FileHash -Algorithm SHA256 ruscal-setup.exe

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s" "$PREV".."${{ github.ref_name }}")
          else
            BODY=$(git log --pretty=format:"- %s")
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ruscal ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: false
          # Ship both: the Inno installer (winget-pkgs target, Start-menu
          # shortcut, Apps & Features entry) and the bare exe (portable
          # users / advanced installs / scripted environments).
          files: |
            ruscal-setup.exe
            target/x86_64-pc-windows-msvc/release/ruscal.exe
