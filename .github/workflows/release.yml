name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Static-link the MSVC C runtime. Without +crt-static the
          # binary loads vcruntime140.dll and msvcp140.dll at startup
          # and exits with 0xC0000135 STATUS_DLL_NOT_FOUND on any
          # Windows system that lacks the Visual C++ Redistributable,
          # including the winget-pkgs validation sandbox. Binary grows
          # by ~1 MB.
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          # Inno Setup 6 is preinstalled on windows-latest runners under
          # C:\Program Files (x86)\Inno Setup 6\. Compile in-place; output
          # lands next to the .iss file as `ruscal-setup.exe`.
          $version = "${{ github.ref_name }}".TrimStart("v")
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found at $iscc; installing via choco"
            choco install innosetup -y --no-progress
          }
          & $iscc "/DMyAppVersion=$version" installer\ruscal.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit $LASTEXITCODE" }
          # Surface the produced installer next to the bare exe so the
          # release step can attach both.
          Move-Item installer\Output\ruscal-setup.exe .
          Get-FileHash -Algorithm SHA256 ruscal-setup.exe

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s" "$PREV".."${{ github.ref_name }}")
          else
            BODY=$(git log --pretty=format:"- %s")
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: gh-release
        uses: softprops/action-gh-release@v2
        with:
          name: ruscal ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: false
          # Ship both: the Inno installer (winget-pkgs target, Start-menu
          # shortcut, Apps & Features entry) and the bare exe (portable
          # users / advanced installs / scripted environments).
          files: |
            ruscal-setup.exe
            target/x86_64-pc-windows-msvc/release/ruscal.exe

  winget:
    # Auto-submit a `microsoft/winget-pkgs` PR for the new release.
    # Runs after the release job so the installer asset exists and
    # the SHA256 stamped into the manifest matches what users will
    # actually download.
    needs: build
    runs-on: windows-latest
    if: ${{ !contains(github.ref_name, '-') }}  # skip pre-release tags
    env:
      GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Submit WinGet manifest update
        id: winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: tieo.ruscal
          # Pick only the Inno installer — the bare ruscal.exe is for
          # portable use and intentionally absent from the WinGet manifest.
          installers-regex: 'ruscal-setup\.exe$'
          # Classic PAT with `public_repo` scope, scoped to push to
          # `tieo/winget-pkgs` (the existing fork of microsoft/winget-pkgs).
          # Stored as a repo secret — see docs/SIGNING.md for setup notes.
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Patch manifest Architecture to x64
        # komac (the tool inside winget-releaser) inspects the installer's
        # PE header to determine architecture. Inno Setup compiles a
        # *32-bit* bootstrapper exe by default — even when the payload is
        # 64-bit — so komac records `Architecture: x86` and the
        # winget-pkgs validator then complains the new manifest is
        # "missing the x64 installer" that prior versions had. Patch the
        # manifest in place on the PR branch.
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -e
          ver="${VERSION#v}"
          # Find the PR that winget-releaser just opened. Latest open PR
          # by this account against microsoft/winget-pkgs for this version.
          pr_branch=$(gh pr list --repo microsoft/winget-pkgs --author tieo --state open \
            --search "tieo.ruscal $ver in:title" \
            --json headRefName -q '.[0].headRefName')
          if [ -z "$pr_branch" ]; then
            echo "no winget-releaser PR found — nothing to patch"; exit 0
          fi
          echo "patching branch: $pr_branch"
          path="manifests/t/tieo/ruscal/$ver/tieo.ruscal.installer.yaml"
          gh api "repos/tieo/winget-pkgs/contents/$path?ref=$pr_branch" -q '.content' \
            | base64 -d > installer.yaml
          if grep -q "Architecture: x86" installer.yaml; then
            sed -i 's/Architecture: x86/Architecture: x64/' installer.yaml
            sha=$(gh api "repos/tieo/winget-pkgs/contents/$path?ref=$pr_branch" -q '.sha')
            content=$(base64 -w0 installer.yaml)
            gh api -X PUT "repos/tieo/winget-pkgs/contents/$path" \
              -f "branch=$pr_branch" \
              -f "message=Architecture: x64 (Inno bootstrapper is 32-bit; payload is x64)" \
              -f "sha=$sha" \
              -f "content=$content"
            echo "architecture patched"
          else
            echo "no x86 architecture to patch (already x64?)"
          fi
